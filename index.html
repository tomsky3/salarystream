<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💰 SalaryStream 薪流 — 每一秒都在离想要的东西更近一步</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Theme System ===== */
    html {
      transition: background-color 0.4s ease, color 0.4s ease;
    }
    [data-theme='gold'] {
      --accent-main: #f59e0b; --accent-light: #fbbf24; --accent-dim: rgba(245,158,11,0.15);
      --gradient-accent: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%);
      --gradient-bg: radial-gradient(ellipse at top, rgba(245,158,11,0.08) 0%, transparent 60%);
      --border-glow: rgba(251,191,36,0.15);
      --shadow-accent: 0 0 40px rgba(245,158,11,0.15);
      --btn-shadow: 0 4px 16px rgba(245,158,11,0.25);
      --btn-shadow-hover: 0 6px 24px rgba(245,158,11,0.35);
      --orb1: rgba(245,158,11,0.2); --orb2: rgba(16,185,129,0.1); --orb3: rgba(168,85,247,0.08);
    }
    [data-theme='emerald'] {
      --accent-main: #10b981; --accent-light: #34d399; --accent-dim: rgba(16,185,129,0.14);
      --gradient-accent: linear-gradient(135deg, #059669 0%, #34d399 50%, #10b981 100%);
      --gradient-bg: radial-gradient(ellipse at top, rgba(16,185,129,0.08) 0%, transparent 60%);
      --border-glow: rgba(52,211,153,0.15);
      --shadow-accent: 0 0 40px rgba(16,185,129,0.15);
      --btn-shadow: 0 4px 16px rgba(16,185,129,0.25);
      --btn-shadow-hover: 0 6px 24px rgba(16,185,129,0.35);
      --orb1: rgba(16,185,129,0.22); --orb2: rgba(6,182,212,0.1); --orb3: rgba(139,92,246,0.08);
    }
    [data-theme='ocean'] {
      --accent-main: #3b82f6; --accent-light: #60a5fa; --accent-dim: rgba(59,130,246,0.14);
      --gradient-accent: linear-gradient(135deg, #2563eb 0%, #60a5fa 50%, #3b82f6 100%);
      --gradient-bg: radial-gradient(ellipse at top, rgba(59,130,246,0.08) 0%, transparent 60%);
      --border-glow: rgba(96,165,250,0.15);
      --shadow-accent: 0 0 40px rgba(59,130,246,0.15);
      --btn-shadow: 0 4px 16px rgba(59,130,246,0.25);
      --btn-shadow-hover: 0 6px 24px rgba(59,130,246,0.35);
      --orb1: rgba(59,130,246,0.2); --orb2: rgba(168,85,247,0.1); --orb3: rgba(236,72,153,0.08);
    }
    [data-theme='rose'] {
      --accent-main: #ec4899; --accent-light: #f472b6; --accent-dim: rgba(236,72,153,0.14);
      --gradient-accent: linear-gradient(135deg, #db2777 0%, #f472b6 50%, #ec4899 100%);
      --gradient-bg: radial-gradient(ellipse at top, rgba(236,72,153,0.08) 0%, transparent 60%);
      --border-glow: rgba(244,114,182,0.15);
      --shadow-accent: 0 0 40px rgba(236,72,153,0.15);
      --btn-shadow: 0 4px 16px rgba(236,72,153,0.25);
      --btn-shadow-hover: 0 6px 24px rgba(236,72,153,0.35);
      --orb1: rgba(236,72,153,0.2); --orb2: rgba(244,63,94,0.1); --orb3: rgba(245,158,11,0.08);
    }
    [data-theme='violet'] {
      --accent-main: #a855f7; --accent-light: #c084fc; --accent-dim: rgba(168,85,247,0.14);
      --gradient-accent: linear-gradient(135deg, #9333ea 0%, #c084fc 50%, #a855f7 100%);
      --gradient-bg: radial-gradient(ellipse at top, rgba(168,85,247,0.08) 0%, transparent 60%);
      --border-glow: rgba(192,132,252,0.15);
      --shadow-accent: 0 0 40px rgba(168,85,247,0.15);
      --btn-shadow: 0 4px 16px rgba(168,85,247,0.25);
      --btn-shadow-hover: 0 6px 24px rgba(168,85,247,0.35);
      --orb1: rgba(168,85,247,0.2); --orb2: rgba(59,130,246,0.1); --orb3: rgba(236,72,153,0.08);
    }
    [data-theme='coral'] {
      --accent-main: #f97316; --accent-light: #fb923c; --accent-dim: rgba(249,115,22,0.14);
      --gradient-accent: linear-gradient(135deg, #ea580c 0%, #fb923c 50%, #f97316 100%);
      --gradient-bg: radial-gradient(ellipse at top, rgba(249,115,22,0.08) 0%, transparent 60%);
      --border-glow: rgba(251,146,60,0.15);
      --shadow-accent: 0 0 40px rgba(249,115,22,0.15);
      --btn-shadow: 0 4px 16px rgba(249,115,22,0.25);
      --btn-shadow-hover: 0 6px 24px rgba(249,115,22,0.35);
      --orb1: rgba(249,115,22,0.2); --orb2: rgba(245,158,11,0.12); --orb3: rgba(239,68,68,0.06);
    }
    [data-theme='cyan'] {
      --accent-main: #06b6d4; --accent-light: #22d3ee; --accent-dim: rgba(6,182,212,0.14);
      --gradient-accent: linear-gradient(135deg, #0891b2 0%, #22d3ee 50%, #06b6d4 100%);
      --gradient-bg: radial-gradient(ellipse at top, rgba(6,182,212,0.08) 0%, transparent 60%);
      --border-glow: rgba(34,211,238,0.15);
      --shadow-accent: 0 0 40px rgba(6,182,212,0.15);
      --btn-shadow: 0 4px 16px rgba(6,182,212,0.25);
      --btn-shadow-hover: 0 6px 24px rgba(6,182,212,0.35);
      --orb1: rgba(6,182,212,0.2); --orb2: rgba(16,185,129,0.1); --orb3: rgba(59,130,246,0.08);
    }
    [data-theme='lime'] {
      --accent-main: #84cc16; --accent-light: #a3e635; --accent-dim: rgba(132,204,22,0.13);
      --gradient-accent: linear-gradient(135deg, #65a30d 0%, #a3e635 50%, #84cc16 100%);
      --gradient-bg: radial-gradient(ellipse at top, rgba(132,204,22,0.07) 0%, transparent 60%);
      --border-glow: rgba(163,230,53,0.15);
      --shadow-accent: 0 0 40px rgba(132,204,22,0.15);
      --btn-shadow: 0 4px 16px rgba(132,204,22,0.25);
      --btn-shadow-hover: 0 6px 24px rgba(132,204,22,0.35);
      --orb1: rgba(132,204,22,0.2); --orb2: rgba(245,158,11,0.08); --orb3: rgba(20,184,166,0.08);
    }
    [data-theme='ruby'] {
      --accent-main: #e11d48; --accent-light: #fb7185; --accent-dim: rgba(225,29,72,0.14);
      --gradient-accent: linear-gradient(135deg, #be123c 0%, #fb7185 50%, #e11d48 100%);
      --gradient-bg: radial-gradient(ellipse at top, rgba(225,29,72,0.08) 0%, transparent 60%);
      --border-glow: rgba(251,113,133,0.15);
      --shadow-accent: 0 0 40px rgba(225,29,72,0.15);
      --btn-shadow: 0 4px 16px rgba(225,29,72,0.25);
      --btn-shadow-hover: 0 6px 24px rgba(225,29,72,0.35);
      --orb1: rgba(225,29,72,0.2); --orb2: rgba(236,72,153,0.1); --orb3: rgba(168,85,247,0.08);
    }
    [data-theme='light'] {
      --bg-primary: #f8fafc;
      --bg-secondary: #f1f5f9;
      --bg-card: #ffffff;
      --bg-card-hover: #f8fafc;
      --border-color: rgba(0,0,0,0.08);
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --accent-main: #0ea5e9; --accent-light: #38bdf8; --accent-dim: rgba(14,165,233,0.1);
      --gradient-accent: linear-gradient(135deg, #0284c7 0%, #38bdf8 50%, #0ea5e9 100%);
      --gradient-bg: radial-gradient(ellipse at top, rgba(14,165,233,0.06) 0%, transparent 60%);
      --border-glow: rgba(56,189,248,0.2);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.08);
      --shadow-lg: 0 16px 64px rgba(0,0,0,0.1);
      --shadow-accent: 0 0 40px rgba(14,165,233,0.1);
      --btn-shadow: 0 4px 16px rgba(14,165,233,0.2);
      --btn-shadow-hover: 0 6px 24px rgba(14,165,233,0.3);
      --orb1: rgba(14,165,233,0.1); --orb2: rgba(99,102,241,0.07); --orb3: rgba(236,72,153,0.05);
    }

    /* Apply theme vars to existing var names */
    :root {
      --accent-gold: var(--accent-main, #f59e0b);
      --accent-gold-light: var(--accent-light, #fbbf24);
      --accent-gold-dim: var(--accent-dim, rgba(245,158,11,0.15));
      --gradient-gold: var(--gradient-accent, linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%));
      --shadow-gold: var(--shadow-accent);
    }

    /* ===== Theme Switcher ===== */
    .theme-switcher-wrap { position: relative; }
    .theme-btn {
      width: 38px; height: 38px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .theme-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.12);
    }
    .theme-btn svg { width: 18px; height: 18px; color: var(--text-secondary); transition: transform 0.3s ease; }
    .theme-btn:hover svg { transform: rotate(30deg); }
    .theme-btn .theme-dot {
      position: absolute;
      bottom: 4px; right: 4px;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent-main);
      box-shadow: 0 0 6px var(--accent-main);
    }
    
    /* Theme Dropdown Panel */
    .theme-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 280px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 16px;
      z-index: 200;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px) scale(0.96);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-lg);
    }
    .theme-dropdown.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }
    .theme-dropdown-header {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .theme-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .theme-option {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      border: 2px solid transparent;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s ease;
      position: relative;
      padding: 8px 4px;
    }
    .theme-option:hover { transform: scale(1.08); }
    .theme-option.active {
      border-color: var(--text-primary);
      box-shadow: 0 0 0 2px var(--bg-card), 0 0 0 4px currentColor;
    }
    .theme-swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2), 0 2px 8px rgba(0,0,0,0.15);
    }
    .theme-name {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text-muted);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .theme-option.active .theme-name { color: var(--text-primary); }

    /* ===== CSS Variables ===== */
    :root {
      --bg-primary: #07080c;
      --bg-secondary: #0d1017;
      --bg-card: #12161f;
      --bg-card-hover: #181d29;
      --border-color: rgba(255,255,255,0.06);
      --border-glow: rgba(251,191,36,0.15);
      
      --text-primary: #f4f4f5;
      --text-secondary: #a1a1aa;
      --text-muted: #52525b;
      
      --accent-gold: #f59e0b;
      --accent-gold-light: #fbbf24;
      --accent-gold-dim: rgba(245,158,11,0.15);
      --accent-green: #10b981;
      --accent-green-dim: rgba(16,185,129,0.12);
      --accent-red: #ef4444;
      --accent-blue: #3b82f6;
      --accent-purple: #a855f7;
      --accent-pink: #ec4899;
      
      --gradient-gold: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%);
      --gradient-bg: radial-gradient(ellipse at top, rgba(245,158,11,0.08) 0%, transparent 60%);
      --gradient-card: linear-gradient(145deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md: 0 8px 32px rgba(0,0,0,0.4);
      --shadow-lg: 0 16px 64px rgba(0,0,0,0.5);
      --shadow-gold: 0 0 40px rgba(245,158,11,0.15);
      
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-xl: 28px;
      
      --font-display: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'Space Mono', 'Courier New', monospace;
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    html {
      font-size: 16px;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    body {
      font-family: var(--font-display);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
      transition: background-color 0.4s ease, color 0.3s ease;
    }

    /* ===== Background Atmosphere ===== */
    .bg-atmosphere {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-atmosphere::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: var(--gradient-bg);
    }
    .bg-atmosphere .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }
    .bg-atmosphere .glow-orb:nth-child(1) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--orb1, rgba(245,158,11,0.2)), transparent 70%);
      top: -10%; right: -5%;
      animation-delay: 0s;
    }
    .bg-atmosphere .glow-orb:nth-child(2) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, var(--orb2, rgba(16,185,129,0.1)), transparent 70%);
      bottom: 10%; left: -5%;
      animation-delay: -7s;
    }
    .bg-atmosphere .glow-orb:nth-child(3) {
      width: 300px; height: 300px;
      background: radial-gradient(circle, var(--orb3, rgba(168,85,247,0.08)), transparent 70%);
      top: 40%; left: 30%;
      animation-delay: -14s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ===== Grid Pattern Overlay ===== */
    .grid-pattern {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
    }

    /* ===== Main Container ===== */
    .app-container {
      position: relative;
      z-index: 1;
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 0 32px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: var(--gradient-accent, linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--btn-shadow, 0 4px 20px rgba(245,158,11,0.3));
    }
    .logo-icon svg { width: 24px; height: 24px; color: #000; }
    .logo-text { display: flex; flex-direction: column; }
    .logo-title {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: var(--gradient-accent, linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-subtitle {
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .header-actions { display: flex; gap: 10px; }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    .btn svg { width: 16px; height: 16px; }
    .btn-ghost {
      background: rgba(255,255,255,0.05);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }
    .btn-primary {
      background: var(--gradient-accent, linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%));
      color: #000;
      box-shadow: var(--btn-shadow, 0 4px 16px rgba(245,158,11,0.25));
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: var(--btn-shadow-hover, 0 6px 24px rgba(245,158,11,0.35));
    }
    .btn-danger {
      background: rgba(239,68,68,0.12);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.2); }
    .btn-small { padding: 7px 13px; font-size: 0.78rem; }

    /* ===== Setup Panel ===== */
    .setup-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 36px;
      margin-bottom: 28px;
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow-md);
    }
    .setup-panel.hidden { display: none; }
    .setup-header { text-align: center; margin-bottom: 32px; }
    .setup-title {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }
    .setup-desc {
      color: var(--text-secondary);
      font-size: 0.95rem;
      max-width: 480px;
      margin: 0 auto;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      max-width: 640px;
      margin: 0 auto;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 1rem;
      transition: all 0.2s ease;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus {
      border-color: var(--accent-main);
      box-shadow: 0 0 0 3px var(--accent-dim, rgba(245,158,11,0.15));
    }
    .form-group input::placeholder { color: var(--text-muted); }
    .currency-prefix {
      position: relative;
    }
    .currency-prefix::before {
      content: '¥';
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent-main);
      font-family: var(--font-mono);
      font-weight: 700;
      font-size: 1.1rem;
    }
    .currency-prefix input { padding-left: 36px; }
    .setup-submit {
      text-align: center;
      margin-top: 28px;
    }
    .setup-submit .btn {
      padding: 14px 40px;
      font-size: 1rem;
    }

    /* ===== Dashboard ===== */
    .dashboard.hidden { display: none; }

    /* ----- Hero Counter ----- */
    .hero-section {
      text-align: center;
      padding: 48px 0 40px;
      position: relative;
    }
    .hero-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent-main, #f59e0b);
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .hero-label .pulse-dot {
      width: 8px; height: 8px;
      background: var(--accent-green);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.5); }
      50% { opacity: 0.7; box-shadow: 0 0 0 8px rgba(16,185,129,0); }
    }
    
    .hero-counter {
      font-family: var(--font-mono);
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      background: var(--gradient-accent, linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      display: inline-block;
    }
    .hero-unit {
      font-size: 1rem;
      color: var(--text-muted);
      margin-top: 8px;
      font-weight: 400;
    }

    /* Stats Row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 600px;
      margin: 28px auto 0;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 18px;
      text-align: center;
      transition: all 0.25s ease;
    }
    .stat-card:hover {
      border-color: var(--border-glow, rgba(251,191,36,0.15));
      background: var(--bg-card-hover);
    }
    .stat-label {
      font-size: 0.72rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .stat-value {
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .stat-value.value-gold { color: var(--accent-light, #fbbf24); }
    .stat-value.value-green { color: var(--accent-green); }

    /* ----- Section Headers ----- */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-top: 8px;
    }
    .section-title {
      font-size: 1.15rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title svg {
      width: 22px; height: 22px;
      color: var(--accent-main, #f59e0b);
    }

    /* ----- Goals Section ----- */
    .goals-section {
      margin-top: 36px;
    }
    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    /* Goal Card */
    .goal-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: default;
    }
    .goal-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--goal-accent, var(--accent-gold));
      opacity: 0.8;
    }
    .goal-card:hover {
      border-color: rgba(255,255,255,0.1);
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
    }
    .goal-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .goal-icon-wrap {
      width: 52px; height: 52px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--goal-bg, var(--accent-gold-dim));
      flex-shrink: 0;
    }
    .goal-icon-wrap svg {
      width: 28px; height: 28px;
      color: var(--goal-accent, var(--accent-gold));
    }
    .goal-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .goal-card:hover .goal-actions { opacity: 1; }
    .action-btn {
      width: 30px; height: 30px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      background: rgba(0,0,0,0.3);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .action-btn svg { width: 14px; height: 14px; }
    .action-btn:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
      border-color: rgba(255,255,255,0.15);
    }
    .action-btn.delete:hover {
      background: rgba(239,68,68,0.15);
      color: #f87171;
      border-color: rgba(239,68,68,0.3);
    }
    
    .goal-name {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .goal-price-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 16px;
    }
    .goal-current {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent-light, #fbbf24);
    }
    .goal-sep { color: var(--text-muted); font-size: 0.85rem; }
    .goal-total {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--text-secondary);
    }

    /* Progress Bar */
    .progress-track {
      width: 100%;
      height: 10px;
      background: rgba(0,0,0,0.4);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 14px;
      position: relative;
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--gradient-accent, linear-gradient(135deg, #f59e0b, #fbbf24));
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .progress-percent {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent-main, #f59e0b);
      margin-bottom: 12px;
    }
    
    .goal-countdown {
      background: rgba(0,0,0,0.25);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .countdown-icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--accent-green-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .countdown-icon svg { width: 16px; height: 16px; color: var(--accent-green); }
    .countdown-text { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.4; }
    .countdown-text strong {
      color: var(--accent-green);
      font-weight: 700;
    }

    /* Goal Completed State */
    .goal-card.completed {
      border-color: rgba(16,185,129,0.2);
    }
    .goal-card.completed::before { background: var(--accent-green); }
    .goal-card.completed .progress-fill { background: var(--accent-green); }
    .goal-completed-badge {
      position: absolute;
      top: 16px; right: 16px;
      background: var(--accent-green-dim);
      color: var(--accent-green);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Empty Goals State */
    .empty-goals {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      border: 2px dashed var(--border-color);
      border-radius: var(--radius-xl);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .empty-goals:hover {
      border-color: var(--accent-main);
      color: var(--text-secondary);
      background: var(--accent-dim, rgba(245,158,11,0.03));
    }
    .empty-goals svg {
      width: 48px; height: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }
    .empty-goals-text {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .empty-goals-hint {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* ----- Equivalents Panel (等价物翻译器) ----- */
    .equivalents-section {
      margin-top: 40px;
    }
    .equiv-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }
    .equiv-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all 0.25s ease;
    }
    .equiv-card:hover {
      border-color: rgba(255,255,255,0.1);
      background: var(--bg-card-hover);
    }
    .equiv-icon {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: var(--item-bg, rgba(245,158,11,0.1));
    }
    .equiv-icon svg {
      width: 24px; height: 24px;
      color: var(--item-color, var(--accent-gold));
    }
    .equiv-info { flex: 1; min-width: 0; }
    .-equiv-value {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .equiv-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-xl);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--shadow-lg);
      transform: scale(0.95) translateY(10px);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .modal-title {
      font-size: 1.3rem;
      font-weight: 700;
    }
    .modal-close {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .modal-close:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
    }
    .modal-close svg { width: 18px; height: 18px; }
    .modal-body .form-group { margin-bottom: 18px; }

    /* Icon Picker */
    .icon-picker {
      margin-top: 8px;
    }
    .icon-picker-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    .icon-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }
    .icon-option {
      aspect-ratio: 1;
      border-radius: var(--radius-sm);
      border: 2px solid var(--border-color);
      background: rgba(0,0,0,0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      padding: 10px;
    }
    .icon-option svg {
      width: 22px; height: 22px;
      color: var(--text-secondary);
      transition: color 0.2s ease;
    }
    .icon-option:hover {
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
    }
    .icon-option:hover svg { color: var(--text-primary); }
    .icon-option.selected {
      border-color: var(--accent-main);
      background: var(--accent-dim, rgba(245,158,11,0.15));
    }
    .icon-option.selected svg { color: var(--accent-main); }

    .modal-footer {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 28px;
    }

    /* ===== Settings Bar ===== */
    .settings-bar {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .settings-info {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .settings-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .settings-item strong {
      color: var(--text-primary);
      font-weight: 600;
    }
    .settings-item .badge {
      background: var(--accent-dim, rgba(245,158,11,0.15));
      color: var(--accent-light, #fbbf24);
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 600;
    }

    /* ===== Footer ===== */
    .footer {
      text-align: center;
      padding: 40px 0 20px;
      color: var(--text-muted);
      font-size: 0.8rem;
    }
    .footer-slogan {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-style: italic;
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      .app-container { padding: 16px 14px 40px; }
      .header { flex-direction: column; gap: 16px; align-items: flex-start; }
      .hero-section { padding: 32px 0 28px; }
      .stats-row { grid-template-columns: 1fr; gap: 10px; }
      .stat-card { padding: 14px; }
      .goals-grid { grid-template-columns: 1fr; }
      .equiv-grid { grid-template-columns: 1fr; }
      .settings-bar { flex-direction: column; align-items: flex-start; }
      .setup-panel { padding: 24px 20px; }
      .modal { padding: 24px; }
      .icon-grid { grid-template-columns: repeat(5, 1fr); }
      .goal-actions { opacity: 1; }
    }
    @media (max-width: 480px) {
      .logo-title { font-size: 1.15rem; }
      .hero-counter { font-size: 2.5rem; }
      .icon-grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* ===== Animations ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in {
      animation: fadeInUp 0.5s ease forwards;
    }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.2s; opacity: 0; }
    .delay-3 { animation-delay: 0.3s; opacity: 0; }
    .delay-4 { animation-delay: 0.4s; opacity: 0; }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    /* ===== Confetti Celebration ===== */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 200;
      overflow: hidden;
      display: none;
    }
    .confetti-container.active { display: block; }
    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      top: -10px;
      animation: confetti-fall 3s ease-out forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotateZ(0deg) rotateX(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotateZ(720deg) rotateX(360deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <!-- Background Atmosphere -->
  <div class="bg-atmosphere">
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
  </div>
  <div class="grid-pattern"></div>

  <!-- Confetti Container -->
  <div class="confetti-container" id="confettiContainer"></div>

  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <div class="logo-text">
          <span class="logo-title">SalaryStream</span>
          <span class="logo-subtitle">薪流 · 实时薪资可视化</span>
        </div>
      </div>
      <!-- Theme Switcher — always visible -->
      <div class="theme-switcher-wrap">
        <button class="btn btn-ghost btn-small theme-btn" onclick="toggleThemeDropdown(event)" title="切换主题">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
          <span class="theme-dot"></span>
        </button>
        <div class="theme-dropdown" id="themeDropdown">
          <div class="theme-dropdown-header">选择主题</div>
          <div class="theme-grid" id="themeGrid"></div>
        </div>
      </div>
      <div class="header-actions" id="headerActions" style="display:none;">
        <button class="btn btn-ghost btn-small" onclick="openSettings()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          设置
        </button>
        <button class="btn btn-primary btn-small" onclick="openGoalModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          新目标
        </button>
      </div>
    </header>

    <!-- Setup Panel -->
    <section class="setup-panel" id="setupPanel">
      <div class="setup-header">
        <h1 class="setup-title">💰 开始你的薪流之旅</h1>
        <p class="setup-desc">设置你的薪资信息，每一秒都能看到时间如何转化为价值</p>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>每月薪资</label>
          <div class="currency-prefix">
            <input type="number" id="inputMonthlySalary" placeholder="15000" min="0" step="100">
          </div>
        </div>
        <div class="form-group">
          <label>每月工作天数</label>
          <input type="number" id="inputWorkDays" placeholder="22" min="1" max="31" value="22">
        </div>
        <div class="form-group">
          <label>每日工作小时</label>
          <input type="number" id="inputWorkHours" placeholder="8" min="1" max="24" value="8">
        </div>
      </div>
      <div class="setup-submit">
        <button class="btn btn-primary" onclick="startTracking()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px;"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          开始计时
        </button>
      </div>
    </section>

    <!-- Dashboard -->
    <main class="dashboard hidden" id="dashboard">
      <!-- Settings Bar -->
      <div class="settings-bar animate-in">
        <div class="settings-info">
          <div class="settings-item">
            月薪 <span class="badge" id="displayMonthly">—</span>
          </div>
          <div class="settings-item">
            时薪 <strong id="displayHourly">—</strong>
          </div>
          <div class="settings-item">
            秒薪 <strong id="displaySecondly">—</strong>
          </div>
        </div>
        <button class="btn btn-ghost btn-small" onclick="openSettings()">修改设置</button>
      </div>

      <!-- Hero Counter -->

];

let currentTheme = 'gold';

function initTheme() {
  const saved = localStorage.getItem('salarystream_theme');
  if (saved && THEMES.find(t => t.id === saved)) {
    currentTheme = saved;
  } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
    // Keep default dark gold for now; user can switch to light manually
  }
  applyTheme(currentTheme);
}

function applyTheme(themeId) {
  currentTheme = themeId;
  const root = document.documentElement;
  root.setAttribute('data-theme', themeId);
  
  // Force reflow so CSS variables update immediately
  void root.offsetHeight;
  
  // Update active state in grid
  document.querySelectorAll('.theme-option').forEach(el => {
    el.classList.toggle('active', el.dataset.theme === themeId);
  });
  
  // Update theme dot color
  const themeData = THEMES.find(t => t.id === themeId);
  if (themeData) {
    const dot = document.querySelector('.theme-dot');
    if (dot) dot.style.background = getSwatchColor(themeData.swatch);
  }
  
  // Save preference
  try { localStorage.setItem('salarystream_theme', themeId); } catch(e) {}
}

function getSwatchColor(gradient) {
  const match = gradient.match(/#[0-9a-fA-F]{6}/g);
  return match ? match[0] : '#f59e0b';
}

function toggleThemeDropdown(e) {
  e.stopPropagation();
  const dropdown = document.getElementById('themeDropdown');
  dropdown.classList.toggle('open');
}

function closeThemeDropdown() {
  const dropdown = document.getElementById('themeDropdown');
  if (dropdown) dropdown.classList.remove('open');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.theme-switcher-wrap')) {
    closeThemeDropdown();
  }
});

function renderThemeGrid() {
  const grid = document.getElementById('themeGrid');
  let html = '';
  THEMES.forEach(t => {
    html += `
      <div class="theme-option ${t.id === currentTheme ? 'active' : ''}" 
           data-theme="${t.id}" 
           onclick="applyTheme('${t.id}')"
           title="${t.name}">
        <div class="theme-swatch" style="background:${t.swatch}"></div>
        <div class="theme-name">${t.name}</div>
      </div>`;
  });
  grid.innerHTML = html;
  
  // Update dot color
  const themeData = THEMES.find(t => t.id === currentTheme);
  if (themeData) {
    const dot = document.querySelector('.theme-dot');
    if (dot) dot.style.background = getSwatchColor(themeData.swatch);
  }
}

// Get today's date string (YYYY-MM-DD)
function getTodayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// Check if the date changed since last session; if so, archive yesterday's earnings
function checkAndArchiveDay() {
  const today = getTodayStr();

  // If we have a lastActiveDate and it's different from today → archive
  if (state.lastActiveDate && state.lastActiveDate !== today) {
    // Save yesterday's earnings (or whatever was last active day)
    // Only archive if we actually had earnings that day (>0 or timer was running)
    if (state.todayStartEarnings > 0 || state.startTime) {
      // Calculate final earned amount for that day
      let earnedForThatDay = state.todayStartEarnings;
      if (state.startTime) {
        const elapsed = (Date.now() - state.startTime) / 1000;
        earnedForThatDay += elapsed * state.secondlyRate;
      }
      if (earnedForThatDay > 0) {
        state.dailyEarnings[state.lastActiveDate] = Math.round(earnedForThatDay * 100) / 100;
      }
    }

    // Reset for new day
    state.todayStartEarnings = 0;
    state.startTime = null;
    // Keep monthly salary and other settings
  }

  // Update last active date to today
  state.lastActiveDate = today;
  saveState();
}

function loadState() {
  const saved = localStorage.getItem('salarystream_state');
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    } catch(e) {}
  }
}

function saveState() {
  localStorage.setItem('salarystream_state', JSON.stringify({
    monthlySalary: state.monthlySalary,
    workDaysPerMonth: state.workDaysPerMonth,
    workHoursPerDay: state.workHoursPerDay,
    hourlyRate: state.hourlyRate,
    secondlyRate: state.secondlyRate,
    startTime: state.startTime,
    todayStartEarnings: state.todayStartEarnings,
    goals: state.goals,
    dailyEarnings: state.dailyEarnings,
    lastActiveDate: state.lastActiveDate
  }));
}

function calculateRates() {
  const totalWorkMinutes = state.workDaysPerMonth * state.workHoursPerDay * 60;
  state.hourlyRate = state.monthlySalary / (state.workDaysPerMonth * state.workHoursPerDay);
  state.secondlyRate = state.monthlySalary / (totalWorkMinutes * 60);
}

// ============================================================
// SETUP
// ============================================================
function startTracking() {
  const salary = parseFloat(document.getElementById('inputMonthlySalary').value);
  if (!salary || salary <= 0) {
    alert('请输入有效的月薪金额');
    return;
  }
  state.monthlySalary = salary;
  state.workDaysPerMonth = parseInt(document.getElementById('inputWorkDays').value) || 22;
  state.workHoursPerDay = parseInt(document.getElementById('inputWorkHours').value) || 8;
  calculateRates();
  state.startTime = Date.now();
  state.todayStartEarnings = 0;
  saveState();
  showDashboard();
  startCounter();
}

function showSetup() {
  document.getElementById('setupPanel').classList.remove('hidden');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('headerActions').style.display = 'none';
}

function showDashboard() {
  document.getElementById('setupPanel').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  document.getElementById('headerActions').style.display = 'flex';
  
  // Update settings bar
  document.getElementById('displayMonthly').textContent = '¥' + state.monthlySalary.toLocaleString();
  document.getElementById('displayHourly').textContent = '¥' + state.hourlyRate.toFixed(2);
  document.getElementById('displaySecondly').textContent = '¥' + formatDecimal(state.secondlyRate);
}

// ============================================================
// COUNTER
// ============================================================
let counterInterval = null;

function startCounter() {
  if (counterInterval) clearInterval(counterInterval);
  counterInterval = setInterval(updateDisplay, 100);
  // Auto-archive every 5 minutes to prevent data loss
  if (archiveInterval) clearInterval(archiveInterval);
  archiveInterval = setInterval(autoArchiveToday, 5 * 60 * 1000);
  updateDisplay();
}

let archiveInterval = null;

// Periodically save today's progress into dailyEarnings as a checkpoint
function autoArchiveToday() {
  if (!state.startTime || !state.secondlyRate) return;
  const elapsed = (Date.now() - state.startTime) / 1000;
  const earned = state.todayStartEarnings + elapsed * state.secondlyRate;
  const todayStr = getTodayStr();

  // Update checkpoint: save current earned as todayStartEarnings baseline
  state.todayStartEarnings = earned;
  state.startTime = Date.now(); // Reset timer from now
  state.dailyEarnings[todayStr] = earned; // Keep latest checkpoint
  saveState();
}

// Archive on page close/unload
window.addEventListener('beforeunload', function() {
  if (state.monthlySalary > 0) {
    // Save final snapshot
    let earned = state.todayStartEarnings;
    if (state.startTime && state.secondlyRate) {
      const elapsed = (Date.now() - state.startTime) / 1000;
      earned += elapsed * state.secondlyRate;
    }
    const todayStr = getTodayStr();
    if (earned > 0) {
      state.dailyEarnings[todayStr] = Math.round(earned * 100) / 100;
    }
    state.lastActiveDate = todayStr;
    try { localStorage.setItem('salarystream_state', JSON.stringify({
      monthlySalary: state.monthlySalary,
      workDaysPerMonth: state.workDaysPerMonth,
      workHoursPerDay: state.workHoursPerDay,
      hourlyRate: state.hourlyRate,
      secondlyRate: state.secondlyRate,
      startTime: state.startTime,
      todayStartEarnings: state.todayStartEarnings,
      goals: state.goals,
      dailyEarnings: state.dailyEarnings,
      lastActiveDate: state.lastActiveDate
    })); } catch(e) {}
  }
});

function updateDisplay() {
  if (!state.startTime || !state.secondlyRate) return;

  const elapsed = (Date.now() - state.startTime) / 1000; // seconds
  const earned = state.todayStartEarnings + elapsed * state.secondlyRate;

  // Show plain 2-decimal format
  document.getElementById('counterValue').textContent = earned.toFixed(2);

  // Update stats
  document.getElementById('todayEarned').textContent = '¥' + formatMoney(earned).full;

  // Month earned: sum of archived days + today's real-time earnings
  const monthTotal = getMonthTotal(earned);
  document.getElementById('monthEarned').textContent = '¥' + Math.round(monthTotal).toLocaleString();

  // Monthly progress (% of salary earned this month)
  const monthPct = ((monthTotal / state.monthlySalary) * 100).toFixed(1);
  document.getElementById('monthProgress').textContent = Math.min(parseFloat(monthPct), 999).toFixed(1) + '%';

  // Update equivalents
  updateEquivalents(earned);

  // Update goals
  updateGoalsProgress(monthTotal); // Use month total for goal progress (more meaningful)
}

// Calculate total earnings for current month: archived days + today real-time
function getMonthTotal(todayRealtimeEarned) {
  const todayStr = getTodayStr();
  let total = 0;
  const yearMonth = todayStr.substring(0, 7); // "2026-04"

  for (const dateStr in state.dailyEarnings) {
    if (dateStr.substring(0, 7) === yearMonth && state.dailyEarnings.hasOwnProperty(dateStr)) {
      total += state.dailyEarnings[dateStr];
    }
  }

  // Add today's realtime earnings
  if (todayRealtimeEarned > 0) {
    total += todayRealtimeEarned;
  }

  return total;
}

function formatMoney(num) {
  const str = num.toFixed(2);
  const dotIndex = str.indexOf('.');
  return {
    full: str,
    intPart: str.substring(0, dotIndex),
    decPart: str.substring(dotIndex)
  };
}

function formatDecimal(num) {
  if (num >= 0.001) return num.toFixed(4);
  if (num >= 0.0001) return num.toFixed(5);
  return num.toFixed(6);
}

// ============================================================
// EQUIVALENTS PANEL
// ============================================================
function updateEquivalents(earned) {
  const grid = document.getElementById('equivGrid');
  let html = '';
  
  EQUIVALENTS.forEach(item => {
    const iconData = GOAL_ICONS.find(i => i.id === item.icon) || GOAL_ICONS[0];
    const count = earned / item.price;
    let displayText = '';
    
    if (count >= 1) {
      displayText = count.toFixed(count >= 100 ? 0 : 1) + ' ' + item.unit;
    } else if (count >= 0.01) {
      displayText = (count * 100).toFixed(1) + '%';
    } else {
      displayText = '<0.1%';
    }
    
    html += `
      <div class="equiv-card">
        <div class="equiv-icon" style="background:${iconData.bg}">
          ${iconData.svg}
        </div>
        <div class="equiv-info">
          <div class="equiv-value">${displayText}</div>
          <div class="equiv-label">${item.label}</div>
        </div>
      </div>
    `;
  });
  
  grid.innerHTML = html;
}

// ============================================================
// GOALS MANAGEMENT
// ============================================================
let completedGoalsThisSession = new Set();

function renderGoals() {
  const grid = document.getElementById('goalsGrid');
  
  if (!state.goals || state.goals.length === 0) {
    grid.innerHTML = `
      <div class="empty-goals" onclick="openGoalModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        <div class="empty-goals-text">还没有设定任何目标</div>
        <div class="empty-goals-hint">点击这里添加你的第一个愿望 🎯</div>
      </div>
    `;
    return;
  }
  
  let html = '';
  state.goals.forEach((goal, idx) => {
    const iconData = GOAL_ICONS.find(i => i.id === goal.iconId) || GOAL_ICONS[0];
    const pct = goal.price > 0 ? Math.min((goal.currentAmount / goal.price) * 100, 100) : 0;
    const remaining = Math.max(goal.price - goal.currentAmount, 0);
    const isCompleted = pct >= 99.99;
    
    // Calculate time to reach goal
    let countdownText = '';
    if (!isCompleted && state.secondlyRate > 0 && remaining > 0) {
      const secondsNeeded = remaining / state.secondlyRate;
      countdownText = formatTimeRemaining(secondsNeeded);
    } else if (isCompleted) {
      countdownText = '🎉 已达成！';
    }
    
    html += `
      <div class="goal-card ${isCompleted ? 'completed' : ''}" style="--goal-accent:${iconData.color};--goal-bg:${iconData.bg}" data-index="${idx}">
        ${isCompleted ? '<div class="goal-completed-badge">✓ 已完成</div>' : ''}
        <div class="goal-card-top">
          <div class="goal-icon-wrap" style="background:${iconData.bg}">
            ${iconData.svg}
          </div>
          <div class="goal-actions">
            <div class="action-btn edit" title="编辑" onclick="editGoal(${idx})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
            </div>
            <div class="action-btn delete" title="删除" onclick="deleteGoal(${idx})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
            </div>
          </div>
        </div>
        <div class="goal-name">${escapeHtml(goal.name)}</div>
        <div class="goal-price-row">
          <span class="goal-current">¥${Math.round(goal.currentAmount).toLocaleString()}</span>
          <span class="goal-sep">/</span>
          <span class="goal-total">¥${goal.price.toLocaleString()}</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
        <div class="progress-percent">${pct.toFixed(1)}%</div>
        ${countdownText ? `
        <div class="goal-countdown">
          <div class="countdown-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div class="countdown-text">${countdownText}</div>
        </div>
        ` : ''}
      </div>
    `;
  });
  
  grid.innerHTML = html;
}

function updateGoalsProgress(earned) {
  let needsRender = false;
  
  state.goals.forEach((goal, idx) => {
    if (goal.price <= 0) return;
    
    const newAmount = Math.floor(earned);
    if (newAmount !== goal.currentAmount) {
      goal.currentAmount = newAmount;
      needsRender = true;
      
      // Check completion celebration
      const pct = (goal.currentAmount / goal.price) * 100;
      if (pct >= 100 && !completedGoalsThisSession.has(idx)) {
        completedGoalsThisSession.add(idx);
        setTimeout(() => celebrateCompletion(goal.name), 300);
      }
    }
  });
  
  if (needsRender) {
    renderGoals();
    saveState();
  }
}

function formatTimeRemaining(seconds) {
  if (seconds <= 0) return '已经可以买了！🎉';
  
  let result = '';
  const days = Math.floor(seconds / 86400);
  const hours = Math.floor((seconds % 86400) / 3600);
  const mins = Math.floor((seconds % 3600) / 60);
  
  if (days > 365) {
    const years = (days / 365).toFixed(1);
    result = `还需约 <strong>${years}年</strong>`;
  } else if (days > 30) {
    const months = (days / 30).toFixed(1);
    result = `还需约 <strong>${months}个月</strong>`;
  } else if (days > 0) {
    result = `再坚持 <strong>${days}天${hours}小时</strong>`;
  } else if (hours > 0) {
    result = `再坚持 <strong>${hours}小时${mins}分</strong>`;
  } else if (mins > 0) {
    const secs = Math.floor(seconds % 60);
    result = `再坚持 <strong>${mins}分${secs}秒</strong>`;
  } else {
    const secs = Math.ceil(seconds);
    result = `再坚持 <strong>${secs}秒</strong>`;
  }
  
  result += '，就能拿下「' + '」';
  return result;
}

function celebrateCompletion(goalName) {
  // Show confetti
  const container = document.getElementById('confettiContainer');
  container.classList.add('active');
  container.innerHTML = '';
  
  const colors = [getComputedStyle(document.documentElement).getPropertyValue('--accent-main').trim() || '#f59e0b',
                  getComputedStyle(document.documentElement).getPropertyValue('--accent-light').trim() || '#fbbf24',
                  '#10b981','#3b82f6','#ec4899','#a855f7'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.width = (Math.random() * 8 + 5) + 'px';
    piece.style.height = piece.style.width;
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDelay = Math.random() * 0.8 + 's';
    piece.style.animationDuration = (Math.random() * 1.5 + 2) + 's';
    container.appendChild(piece);
  }
  
  setTimeout(() => {
    container.classList.remove('active');
    container.innerHTML = '';
  }, 3500);
  
  // Also show an alert
  setTimeout(() => {
    alert(`🎉 恭喜你！\n\n「${goalName}」的目标金额已经攒够了！\n\n你的努力有了回报！`);
  }, 500);
}

// ============================================================
// MODAL OPERATIONS
// ============================================================
function openGoalModal(editIdx = null) {
  state.editingGoalId = editIdx !== null ? editIdx : null;
  document.getElementById('goalModalTitle').textContent = editIdx !== null ? '编辑目标' : '添加新目标';
  document.getElementById('goalNameInput').value = editIdx !== null ? state.goals[editIdx].name : '';
  document.getElementById('goalPriceInput').value = editIdx !== null ? state.goals[editIdx].price : '';
  state.selectedIconId = editIdx !== null ? state.goals[editIdx].iconId : 'star';
  renderIconPickerSelection();
  document.getElementById('goalModalOverlay').classList.add('active');
  setTimeout(() => document.getElementById('goalNameInput').focus(), 100);
}

function closeGoalModal() {
  document.getElementById('goalModalOverlay').classList.remove('active');
  state.editingGoalId = null;
}

function closeGoalModalOnOverlay(e) {
  if (e.target === e.currentTarget) closeGoalModal();
}

function saveGoal() {
  const name = document.getElementById('goalNameInput').value.trim();
  const price = parseFloat(document.getElementById('goalPriceInput').value);
  
  if (!name) { alert('请输入目标名称'); return; }
  if (!price || price <= 0) { alert('请输入有效价格'); return; }
  
  const goal = {
    name: name,
    price: price,
    currentAmount: 0,
    iconId: state.selectedIconId,
    createdAt: Date.now()
  };
  
  if (state.editingGoalId !== null) {
    goal.currentAmount = state.goals[state.editingGoalId].currentAmount;
    goal.createdAt = state.goals[state.editingGoalId].createdAt;
    state.goals[state.editingGoalId] = goal;
  } else {
    state.goals.push(goal);
  }
  
  saveState();
  renderGoals();
  closeGoalModal();
  
  // If we're tracking, immediately update progress
  if (state.startTime) {
    const elapsed = (Date.now() - state.startTime) / 1000;
    const earned = state.todayStartEarnings + elapsed * state.secondlyRate;
    updateGoalsProgress(earned);
  }
}

function editGoal(idx) {
  openGoalModal(idx);
}

function deleteGoal(idx) {
  if (confirm('确定要删除这个目标吗？')) {
    state.goals.splice(idx, 1);
    saveState();
    renderGoals();
  }
}

// ============================================================
// SETTINGS MODAL
// ============================================================
function openSettings() {
  document.getElementById('settingsMonthly').value = state.monthlySalary;
  document.getElementById('settingsWorkDays').value = state.workDaysPerMonth;
  document.getElementById('settingsWorkHours').value = state.workHoursPerDay;
  document.getElementById('settingsModalOverlay').classList.add('active');
}

function closeSettings() {
  document.getElementById('settingsModalOverlay').classList.remove('active');
}

function closeSettingsOnOverlay(e) {
  if (e.target === e.currentTarget) closeSettings();
}

function saveSettings() {
  const salary = parseFloat(document.getElementById('settingsMonthly').value);
  if (!salary || salary <= 0) { alert('请输入有效月薪'); return; }

  // Archive current session's earnings BEFORE rate change
  let currentEarned = 0;
  if (state.startTime && state.secondlyRate > 0) {
    const elapsed = (Date.now() - state.startTime) / 1000;
    currentEarned = state.todayStartEarnings + elapsed * state.secondlyRate;
  }
  if (currentEarned > 0) {
    const todayStr = getTodayStr();
    // Add to existing or create new
    const prev = state.dailyEarnings[todayStr] || 0;
    state.dailyEarnings[todayStr] = Math.round((prev + currentEarned) * 100) / 100;
  }

  state.monthlySalary = salary;
  state.workDaysPerMonth = parseInt(document.getElementById('settingsWorkDays').value) || 22;
  state.workHoursPerDay = parseInt(document.getElementById('settingsWorkHours').value) || 8;
  calculateRates();
  state.startTime = Date.now(); // Reset timer
  state.todayStartEarnings = 0;

  saveState();
  closeSettings();
  showDashboard();
  startCounter();
  renderGoals();
}

// ============================================================
// ICON PICKER
// ============================================================
function renderIconPicker() {
  const grid = document.getElementById('iconPickerGrid');
  let html = '';
  
  GOAL_ICONS.forEach(icon => {
    html += `
      <div class="icon-option ${icon.id === state.selectedIconId ? 'selected' : ''}" 
           data-id="${icon.id}" 
           onclick="selectIcon('${icon.id}')"
           title="${icon.name}">
        ${icon.svg}
      </div>
    `;
  });
  
  grid.innerHTML = html;
}

function renderIconPickerSelection() {
  document.querySelectorAll('.icon-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.id === state.selectedIconId);
  });
}

function selectIcon(id) {
  state.selectedIconId = id;
  renderIconPickerSelection();
}

// ============================================================
// UTILITIES
// ============================================================
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ============================================================
// START
// ============================================================
document.addEventListener('DOMContentLoaded', init);
</script>
